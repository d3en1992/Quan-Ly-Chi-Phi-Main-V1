        <!-- PHẦN A: Thẻ tổng quan (Summary Cards / KPIs) ──────────────── -->

                <div id="cn-kpi-no-tp" class="fw-bold text-danger" style="font-size:24px">—</div>

              </div>
            </div>
          </div>

              <div class="card-body py-3">
                <div class="text-secondary" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🟠 Tổng Nợ Nhà Cung Cấp</div>
                <div id="cn-kpi-no-ncc" class="fw-bold" style="font-size:24px;color:#fd7e14">—</div>

              </div>
            </div>
          </div>
          <div class="col-6 col-md-4">
            <div class="card shadow-sm border-0 h-100" style="border-left:4px solid #198754 !important;background:var(--bs-success-bg-subtle)">
              <div class="card-body py-3">
                <div class="text-secondary" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🟢 Tổng Tiền Đã Ứng</div>
                <div id="cn-kpi-da-ung" class="fw-bold text-success" style="font-size:24px">—</div>
                <div id="cn-kpi-da-ung-sub" class="text-secondary" style="font-size:11px;margin-top:2px"></div>
              </div>
            </div>
          </div>

        <!-- PHẦN B: Bộ lọc nâng cao (Advanced Filters) ───────────────── -->
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body py-3" style="display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap">
            <div>
              <label class="text-secondary d-block" style="font-size:11px;font-weight:600;margin-bottom:3px">Công Trình</label>
              <select id="cn-filter-ct" class="form-select form-select-sm" style="min-width:200px" onchange="cnApplyFilters()">
                <option value="">-- Tất cả công trình --</option>
              </select>
            </div>
            <div>
              <label class="text-secondary d-block" style="font-size:11px;font-weight:600;margin-bottom:3px">Nhóm Đối Tác</label>
              <select id="cn-filter-group" class="form-select form-select-sm" style="min-width:160px" onchange="cnApplyFilters()">
                <option value="">-- Tất cả --</option>
                <option value="thauphu">Thầu Phụ</option>
                <option value="nhacungcap">Nhà Cung Cấp</option>
              </select>
            </div>
            <div>
              <label class="text-secondary d-block" style="font-size:11px;font-weight:600;margin-bottom:3px">Tháng</label>
              <select id="cn-filter-month" class="form-select form-select-sm" style="min-width:150px" onchange="cnApplyFilters()">
                <option value="">-- Tất cả tháng --</option>
              </select>
            </div>
            <div>
              <input type="text" id="cn-filter-search" class="form-control form-control-sm" style="min-width:180px" placeholder="🔍 Tìm đối tác..." oninput="cnApplyFilters()">
            </div>
            <button class="btn btn-outline-secondary btn-sm" onclick="cnResetFilters()" title="Xóa bộ lọc">↺ Đặt lại</button>
          </div>
        </div>

        <div class="records-wrap card shadow-sm overflow-hidden" style="margin-bottom:24px">

            <table class="table table-sm table-hover align-middle mb-0" style="min-width:820px">
              <thead class="table-light">
                <tr style="font-size:11px;color:var(--bs-secondary-color);border-bottom:2px solid var(--bs-border-color)">

                  <th style="text-align:center;padding:8px 10px;font-weight:700;white-space:nowrap">Trạng Thái</th>

              </thead>
              <tbody id="cn-tbody"></tbody>
            </table>
          </div>
